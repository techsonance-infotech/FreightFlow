name: Guard — Block Direct Push

on:
  push:
    branches: [main, master, develop, dev, test, staging]

jobs:
  block-direct-push:
    name: Check Direct Push Violation
    runs-on: ubuntu-latest
    steps:
      - name: Fail on Direct Push
        run: |
          echo "================================================================="
          echo "❌ CRITICAL ERROR: Direct push to branch '${{ github.ref_name }}' detected!"
          echo "-----------------------------------------------------------------"
          echo "Direct pushes to protected branches are forbidden in FreightFlow."
          echo "Please push to a feature branch and open a Pull Request (PR)."
          echo "================================================================="
          exit 1
